server:
  port: 8085

spring:
  application:
    name: agri-agent-service
  servlet:
    multipart:
      max-file-size: ${AGRI_AGENT_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${AGRI_AGENT_UPLOAD_MAX_REQUEST_SIZE:12MB}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

agri-agent:
  uploads:
    dir: ${AGRI_AGENT_UPLOAD_DIR:data/agri-agent/uploads}
    public-base-url: ${AGRI_AGENT_PUBLIC_BASE_URL:http://139.155.96.142:8085}
    public-path: ${AGRI_AGENT_UPLOAD_PUBLIC_PATH:/api/v1/agri-agent/uploads}
    max-size-bytes: ${AGRI_AGENT_UPLOAD_MAX_SIZE_BYTES:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif

coze:
  api:
    base-url: ${COZE_API_BASE_URL:https://api.coze.cn}
    chat-path: ${COZE_API_CHAT_PATH:/v3/chat}
    bot-id: ${COZE_BOT_ID:7628415950198980648}
    pat: ${COZE_PAT:pat_xTeTK1pvxkZYBMaL7JAJYV8Vq7ZybUo9AVmU4cmTC5oMjFfTV52BceIKRkBKrLjc}
    timeout-seconds: ${COZE_TIMEOUT_SECONDS:60}
